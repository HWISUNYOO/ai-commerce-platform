name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1) 백엔드 8개 서비스 병렬 테스트 (H2, 브로커 없이)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - member-service
          - product-service
          - order-service
          - payment-service
          - delivery-service
          - ai-service
          - point-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  # 2) 프론트엔드 빌드
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm ci
          npm run build

  # 3) main 브랜치면 Docker 이미지 빌드 후 GHCR 에 push
  images:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: member-service,       context: services/member-service }
          - { name: product-service,      context: services/product-service }
          - { name: order-service,        context: services/order-service }
          - { name: payment-service,      context: services/payment-service }
          - { name: delivery-service,     context: services/delivery-service }
          - { name: ai-service,           context: services/ai-service }
          - { name: point-service,        context: services/point-service }
          - { name: notification-service, context: services/notification-service }
          - { name: frontend,             context: frontend }
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.name }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.name }}:${{ github.sha }}
