# Tests run against an in-memory H2 database in PostgreSQL-compatibility mode.
# Flyway is disabled here; Hibernate generates the schema from the entities.
# The real PostgreSQL schema is managed by Flyway (db/migration) in the main profile.
spring:
  datasource:
    url: jdbc:h2:mem:product;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: false
  # 테스트에서는 Redis가 없으므로 캐시를 끈다.
  cache:
    type: none
  # 테스트에서는 Kafka 브로커가 없으므로 Saga 리스너를 시작하지 않는다.
  kafka:
    listener:
      auto-startup: false

app:
  events:
    enabled: false
