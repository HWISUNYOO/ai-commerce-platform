# Tests run against an in-memory H2 database in PostgreSQL-compatibility mode.
# Flyway is disabled here; Hibernate generates the schema from the entities.
# Kafka 리스너는 브로커가 없으므로 시작하지 않는다(커스텀 컨테이너 팩토리도 이 값을 읽어 auto-startup=false).
spring:
  datasource:
    url: jdbc:h2:mem:notification;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: false
  kafka:
    listener:
      auto-startup: false
