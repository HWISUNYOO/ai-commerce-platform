spring:
  application:
    name: point-service
  datasource:
    url: jdbc:postgresql://localhost:5432/point_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: point-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.aicommerce.point.event.PaymentApprovedEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.aicommerce.point.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  events:
    enabled: true
  point:
    earn-rate: 0.01   # 결제금액의 1% 적립

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info
