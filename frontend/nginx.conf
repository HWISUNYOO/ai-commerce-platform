# 프론트 정적 서빙 + SPA 라우팅 폴백.
# /api/* 는 k8s 클러스터 내부 서비스로 프록시(개발 Vite 프록시를 운영용으로 대체).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: 없는 경로는 index.html 로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/members     { proxy_pass http://member-service:8081; }
    location /api/products    { proxy_pass http://product-service:8082; }
    location /api/orders      { proxy_pass http://order-service:8083; }
    location /api/payments    { proxy_pass http://payment-service:8084; }
    location /api/deliveries  { proxy_pass http://delivery-service:8085; }
    location /api/points      { proxy_pass http://point-service:8086; }
    location /api/notifications { proxy_pass http://notification-service:8087; }
    location /api/ai          { proxy_pass http://ai-service:8080; }
}
