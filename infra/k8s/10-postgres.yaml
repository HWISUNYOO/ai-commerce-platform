# PostgreSQL (StatefulSet + PVC). 최초 기동 시 initdb 로 서비스별 DB 7개 생성.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ai-commerce
data:
  01-create-databases.sql: |
    CREATE DATABASE member_db;
    CREATE DATABASE product_db;
    CREATE DATABASE order_db;
    CREATE DATABASE payment_db;
    CREATE DATABASE delivery_db;
    CREATE DATABASE point_db;
    CREATE DATABASE notification_db;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ai-commerce
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ai-commerce
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: app-secret, key: DB_USERNAME } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secret, key: DB_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
