# 백엔드 8개 서비스. 각 Deployment+Service.
# - envFrom app-config: KAFKA_BOOTSTRAP, REDIS_HOST/PORT 주입
# - DB 자격: app-secret (DB_USERNAME/DB_PASSWORD)
# - probe: 이미 노출한 /actuator/health/{liveness,readiness} 사용
# - image: 로컬 빌드(ai-commerce/*:latest), imagePullPolicy=IfNotPresent 로 레지스트리 불필요
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: member-service, namespace: ai-commerce }
spec:
  replicas: 1
  selector: { matchLabels: { app: member-service } }
  template:
    metadata:
      labels: { app: member-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: member-service
          image: ai-commerce/member-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          envFrom: [{ configMapRef: { name: app-config } }]
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres:5432/member_db" }
            - { name: DB_USERNAME, valueFrom: { secretKeyRef: { name: app-secret, key: DB_USERNAME } } }
            - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: app-secret, key: DB_PASSWORD } } }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata: { name: member-service, namespace: ai-commerce }
spec:
  selector: { app: member-service }
  ports: [{ port: 8081, targetPort: 8081 }]
