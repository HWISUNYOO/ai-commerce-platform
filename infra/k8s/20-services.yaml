# ai-service: DB/Kafka/Redis 불필요. LLM 백엔드는 컨테이너에 claude.exe(CLI)가 없으므로 api 모드로 둔다.
# (실제 AI 호출엔 ANTHROPIC_API_KEY 필요 — 미설정 시 호출만 실패, 기동/health 는 정상)
apiVersion: apps/v1
kind: Deployment
metadata: { name: ai-service, namespace: ai-commerce }
spec:
  replicas: 1
  selector: { matchLabels: { app: ai-service } }
  template:
    metadata:
      labels: { app: ai-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: ai-service
          image: ai-commerce/ai-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - { name: LLM_BACKEND, value: "api" }
            - { name: PRODUCT_SERVICE_URL, value: "http://product-service:8082" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata: { name: ai-service, namespace: ai-commerce }
spec:
  selector: { app: ai-service }
  ports: [{ port: 8080, targetPort: 8080 }]
