# 애플리케이션(서비스) 컨테이너. 인프라(docker-compose.yml)와 함께 사용한다.
#   전체 기동: docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build
#   전체 중지: docker compose -f docker-compose.yml -f docker-compose.apps.yml down
# 각 서비스는 컨테이너 네트워크에서 postgres/kafka/redis 를 "서비스명"으로 접속한다.
name: ai-commerce

services:
  member-service:
    build: ../services/member-service
    image: ai-commerce/member-service
    container_name: ai-commerce-member
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/member_db
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped

  product-service:
    build: ../services/product-service
    image: ai-commerce/product-service
    container_name: ai-commerce-product
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped

  order-service:
    build: ../services/order-service
    image: ai-commerce/order-service
    container_name: ai-commerce-order
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "127.0.0.1:8083:8083"
    restart: unless-stopped

  payment-service:
    build: ../services/payment-service
    image: ai-commerce/payment-service
    container_name: ai-commerce-payment
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:8084:8084"
    restart: unless-stopped

  delivery-service:
    build: ../services/delivery-service
    image: ai-commerce/delivery-service
    container_name: ai-commerce-delivery
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/delivery_db
    ports:
      - "127.0.0.1:8085:8085"
    restart: unless-stopped

  point-service:
    build: ../services/point-service
    image: ai-commerce/point-service
    container_name: ai-commerce-point
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/point_db
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:8086:8086"
    restart: unless-stopped

  notification-service:
    build: ../services/notification-service
    image: ai-commerce/notification-service
    container_name: ai-commerce-notification
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:8087:8087"
    restart: unless-stopped
